# Brings up postgres, backend (FastAPI), and frontend (Vite) for local
# development. Source code is bind-mounted so hot reload works on both
# the backend and frontend sides.
#
# Usage:
#   cp backend/.env.example backend/.env             # then fill in keys
#   cp frontend/.env.example frontend/.env.local
#   docker compose up --build
#
# Services:
#   postgres  → :5432  persistent store for chat history, traces, etc.
#   backend   → :8000  FastAPI HTTP API
#   frontend  → :5173  Vite dev server with HMR
#
# The LiveKit voice-agent worker is intentionally NOT in this compose
# file — its implementation belongs to a downstream ticket. Add an
# `agent` service alongside `backend` once that ticket lands.

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskorbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskorbit
      POSTGRES_PASSWORD: taskorbit
      POSTGRES_DB: taskorbit
    ports:
      - "5432:5432"
    volumes:
      - taskorbit-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskorbit -d taskorbit"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: taskorbit-backend
    env_file:
      - ./backend/.env
    environment:
      # Override the host so the container talks to the postgres service
      # by its compose name, not localhost.
      DATABASE_URL: postgresql://taskorbit:taskorbit@postgres:5432/taskorbit
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    command: poetry run taskorbit-api --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: taskorbit-frontend
    env_file:
      - ./frontend/.env.local
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy

volumes:
  taskorbit-postgres-data:
